<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>
  // PCでアクセスしたら自動的にPC版へ
  (function(){
    if(location.search.indexOf('noredirect')!==-1) return;
    var ua = navigator.userAgent;
    var isMobile = /iPhone|Android|iPad|iPod|Mobile/i.test(ua) || window.innerWidth < 768;
    if(!isMobile) location.replace('index.html?noredirect=1');
  })();
</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f2b4e">
<title>JRE 車両売買</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --navy: #0f2b4e;
  --blue: #1e5fa8;
  --sky: #3b9eff;
  --gold: #f5a623;
  --green: #27ae60;
  --green-l: #2ecc71;
  --red: #e74c3c;
  --orange: #e67e22;
  --yellow: #f1c40f;
  --bg: #f0f3f8;
  --card: #ffffff;
  --border: #e2eaf4;
  --text: #1a2a3a;
  --muted: #8096b0;
  --tab-h: 68px;
  --header-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, 'SF Pro Display', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; flex-direction: column;
}

/* ── Header ── */
.app-header {
  background: linear-gradient(135deg, var(--navy) 0%, #1a4080 100%);
  height: var(--header-h); flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  padding-top: env(safe-area-inset-top, 0);
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
  position: relative; z-index: 50;
}
.header-left h1 { color: white; font-size: 1rem; font-weight: 800; }
.header-left .sub { color: rgba(255,255,255,.55); font-size: 0.62rem; }
.header-right { color: rgba(255,255,255,.7); font-size: 0.65rem; text-align: right; line-height: 1.5; }
.pc-link {
  display: inline-block; margin-top: 4px;
  background: #8B1A2A; border: 1.5px solid #b02236;
  color: white; font-size: 0.65rem; font-weight: 800;
  padding: 3px 10px; border-radius: 10px; text-decoration: none;
  box-shadow: 0 2px 6px rgba(139,26,42,0.45);
}

/* ── Scrollable content ── */
.app-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 8px);
}

/* ── Tab panels ── */
.tab-panel { display: none; animation: fadeIn .2s ease; }
.tab-panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── Bottom Nav ── */
.bottom-nav {
  height: calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: white;
  border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
  flex-shrink: 0;
  box-shadow: 0 -4px 16px rgba(0,0,0,.08);
  position: relative; z-index: 50;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  border: none; background: none; cursor: pointer;
  color: var(--muted); font-size: 0.6rem; font-weight: 700;
  transition: color .15s;
}
.tab-btn.active { color: var(--navy); }
.tab-btn .tab-icon { font-size: 1.4rem; line-height: 1; }
.tab-btn.active .tab-icon { transform: scale(1.1); }

/* ══════════════════════
   HOME TAB
   ══════════════════════ */
.home-hero {
  background: linear-gradient(160deg, #0c2340 0%, #1a4a90 100%);
  padding: 20px 16px 24px;
  color: white;
}
.hero-label { font-size: 0.68rem; font-weight: 700; opacity: .6; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.hero-val { font-size: 2.2rem; font-weight: 900; color: var(--gold); line-height: 1; margin-bottom: 4px; }
.hero-sub { font-size: 0.72rem; opacity: .55; margin-bottom: 20px; }

/* split bar */
.split-bar {
  height: 32px; border-radius: 10px; overflow: hidden; display: flex;
  background: rgba(255,255,255,.08); margin-bottom: 10px;
}
.seg { display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 800; overflow: hidden; white-space: nowrap; padding: 0 6px; transition: width .6s; }
.seg-stock  { background: linear-gradient(90deg,#c0392b,#e67e22); }
.seg-sold   { background: linear-gradient(90deg,#d35400,#f39c12); }
.seg-cash   { background: linear-gradient(90deg,#1a6fa8,#74b9ff); }
.seg-profit { background: linear-gradient(90deg,#1e8449,#2ecc71); }

.split-legend-m { display: flex; flex-direction: column; gap: 5px; }
.sl-row { display: flex; align-items: center; gap: 8px; }
.sl-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.sl-lbl { font-size: 0.68rem; opacity: .65; flex: 1; }
.sl-v { font-size: 0.82rem; font-weight: 800; }
.sl-p { font-size: 0.62rem; opacity: .4; margin-left: 4px; }

/* Tier 2 mini */
.tier2-mini {
  background: linear-gradient(135deg,#13302a,#1a5c42);
  padding: 14px 16px; margin: 0 12px; border-radius: 14px;
  color: white; margin-top: -8px; margin-bottom: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
}
.tier2-tag { font-size: 0.62rem; color: #7deba5; font-weight: 700; margin-bottom: 4px; }
.tier2-val { font-size: 1.2rem; font-weight: 900; color: #7deba5; }
.tier2-sub { font-size: 0.65rem; opacity: .5; }

/* profit ledger mini */
.ledger-mini {
  margin: 0 12px 12px;
  background: linear-gradient(135deg,#111827,#1e293b);
  border-radius: 14px; padding: 14px 16px; color: white;
  border: 1px solid rgba(39,174,96,.25);
}
.ledger-title { font-size: 0.7rem; color: #7deba5; font-weight: 800; margin-bottom: 10px; }
.ledger-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ledger-item { background: rgba(255,255,255,.06); border-radius: 10px; padding: 10px 12px; border-left: 2px solid rgba(46,204,113,.5); }
.ledger-lbl { font-size: 0.62rem; opacity: .55; margin-bottom: 3px; }
.ledger-v { font-size: 0.95rem; font-weight: 900; color: #2ecc71; }
.ledger-s { font-size: 0.6rem; opacity: .4; margin-top: 2px; }
.ledger-item.warn { border-left-color: rgba(241,196,15,.5); }
.ledger-item.warn .ledger-v { color: var(--yellow); }

/* KPI grid */
.kpi-scroll {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 4px 12px 12px;
}
.kpi-m {
  background: white; border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 2px 10px rgba(15,43,78,.09);
  border-bottom: 3px solid var(--navy);
}
/* 5枚目だけ2列ぶち抜き */
.kpi-m:last-child {
  grid-column: 1 / -1;
}
.kpi-m.g  { border-bottom-color: var(--gold); }
.kpi-m.gr { border-bottom-color: var(--green); }
.kpi-m.b  { border-bottom-color: var(--sky); }
.kpi-m.o  { border-bottom-color: var(--orange); }
.kpi-m.p  { border-bottom-color: #8e44ad; }
.kpi-m-ico { font-size: 1.2rem; margin-bottom: 5px; }
.kpi-m-lbl { font-size: 0.6rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
.kpi-m-val { font-size: 1.1rem; font-weight: 900; margin: 3px 0; line-height: 1.1; color: var(--text); }
.kpi-m-sub { font-size: 0.6rem; color: var(--muted); }

/* ══════════════════════
   台帳 TAB
   ══════════════════════ */
.filter-scroll {
  display: flex; gap: 8px; overflow-x: auto; padding: 12px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none; background: white;
  border-bottom: 1px solid var(--border);
}
.filter-scroll::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid var(--border); background: white;
  font-size: 0.72rem; font-weight: 700; color: var(--muted);
  cursor: pointer; white-space: nowrap; transition: all .15s;
}
.chip.on { background: var(--navy); color: white; border-color: var(--navy); }

.vehicle-list { padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }
.vcard {
  background: white; border-radius: 14px; padding: 14px 16px;
  box-shadow: 0 2px 10px rgba(15,43,78,.08);
  border-left: 4px solid var(--border);
}
.vcard.settled   { border-left-color: var(--green); }
.vcard.principal { border-left-color: var(--yellow); }
.vcard.sold      { border-left-color: var(--orange); }
.vcard.stock     { border-left-color: var(--red); }

.vcard-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.vcard-name { font-size: 0.88rem; font-weight: 800; color: var(--navy); }
.vcard-year { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
.badge-m {
  font-size: 0.62rem; font-weight: 700; padding: 3px 9px; border-radius: 12px;
  white-space: nowrap; flex-shrink: 0;
}
.bs { background: #d5f5e3; color: #1e8449; }
.bp { background: #fef9e7; color: #d35400; }
.bo { background: #fde8d0; color: #a04000; }
.bk { background: #fde8e8; color: #922b21; }

.vcard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; }
.vg-item { }
.vg-lbl { font-size: 0.58rem; color: var(--muted); margin-bottom: 1px; }
.vg-val { font-size: 0.8rem; font-weight: 700; }
.vg-val.profit { color: var(--green); }
.vg-val.jre    { color: var(--blue); }
.vg-val.cost   { color: var(--orange); }
.vcard-divider { border: none; border-top: 1px dashed var(--border); margin: 8px 0 6px; }
.vcard-notes { font-size: 0.7rem; color: var(--muted); background: var(--bg); border-radius: 6px; padding: 6px 8px; margin-top: 6px; }
.vcard-notes strong { color: var(--text); }

.vcard-bar { margin-top: 8px; }
.roi-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 3px; }
.roi-fill { height: 100%; border-radius: 3px; transition: width .5s; }

/* ══════════════════════
   グラフ TAB
   ══════════════════════ */
.chart-section { padding: 12px; display: flex; flex-direction: column; gap: 14px; }
.chart-card-m {
  background: white; border-radius: 14px; padding: 16px;
  box-shadow: 0 2px 10px rgba(15,43,78,.08);
}
.chart-card-m h3 { font-size: 0.78rem; font-weight: 800; color: var(--navy); margin-bottom: 12px; }

/* ══════════════════════
   精算 TAB
   ══════════════════════ */
.settle-section { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
.scard {
  background: white; border-radius: 14px; padding: 16px;
  box-shadow: 0 2px 10px rgba(15,43,78,.08);
  border-top: 4px solid var(--green);
}
.scard.total { border-top-color: var(--gold); background: linear-gradient(135deg,#fffbf0,#fff); }
.scard-date { font-size: 0.65rem; color: var(--muted); margin-bottom: 3px; }
.scard-label { font-size: 0.9rem; font-weight: 800; color: var(--navy); margin-bottom: 12px; }
.scard-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
.scard-row .sl { font-size: 0.75rem; color: var(--muted); }
.scard-row .sr { font-size: 0.82rem; font-weight: 700; }
.scard-divider { border: none; border-top: 1px dashed var(--border); margin: 8px 0; }
.scard-total { font-size: 1.1rem; font-weight: 900; color: var(--green); }
.scard.total .scard-total { color: var(--gold); }

.timeline-m { padding: 12px; display: flex; flex-direction: column; gap: 0; }
.tl-m { display: flex; gap: 12px; padding-bottom: 16px; position: relative; }
.tl-m:not(:last-child)::before { content:''; position:absolute; left:16px; top:32px; bottom:0; width:2px; background:var(--border); }
.tl-dot-m { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.85rem; flex-shrink:0; z-index:1; position:relative; box-shadow:0 2px 6px rgba(0,0,0,.1); }
.tl-dot-m.buy  { background:#ebf5fb; border:2px solid var(--sky); }
.tl-dot-m.sell { background:#d5f5e3; border:2px solid var(--green); }
.tl-body-m { flex:1; padding-top:4px; }
.tl-date-m { font-size:0.62rem; color:var(--muted); }
.tl-name-m { font-size:0.8rem; font-weight:700; color:var(--navy); }
.tl-det-m  { font-size:0.7rem; color:var(--muted); margin-top:1px; }

/* Util */
.sec-title { font-size: 0.72rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 14px 12px 4px; }
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="header-left">
    <h1>🚗 JRE 車両売買</h1>
    <div class="sub">ジェイ・アール・イーコーポレイション</div>
  </div>
  <div class="header-right">
    <div id="headerDate">読み込み中</div>
    <a href="index.html?noredirect=1" class="pc-link">💻 PC版</a>
  </div>
</header>

<!-- Scrollable area -->
<div class="app-content">

  <!-- ══ HOME ══ -->
  <div class="tab-panel active" id="panel-home">

    <!-- Hero: 1段目 300万のみ -->
    <div class="home-hero">
      <div class="hero-label">⭐ 元本300万円のみで運用（メインプラン）</div>
      <div class="hero-val">¥3,000,000</div>
      <div class="hero-sub">初期投資 2025/11/12 スタート　※利益は別勘定</div>
      <div class="split-bar" id="t1bar-m"></div>
      <div class="split-legend-m" id="t1legend-m"></div>
    </div>

    <!-- 2段目 利益込み -->
    <div class="tier2-mini" id="tier2-mini">
      <div class="tier2-tag">📈 2段目：利益も込みで運用した場合（参考）</div>
      <div class="tier2-val" id="t2val-m">¥—</div>
      <div class="tier2-sub" id="t2sub-m">読み込み中…</div>
    </div>

    <!-- 利益別勘定 -->
    <div class="ledger-mini" id="ledger-m"></div>

    <!-- KPI横スクロール -->
    <div class="sec-title">📊 主要指標</div>
    <div class="kpi-scroll" id="kpi-m"></div>

  </div>

  <!-- ══ 台帳 ══ -->
  <div class="tab-panel" id="panel-list">
    <div class="filter-scroll" id="filter-m">
      <button class="chip on" onclick="setFM('all')">全件</button>
      <button class="chip" onclick="setFM('settled')">✅ 精算完了</button>
      <button class="chip" onclick="setFM('principal_returned')">💛 利益精算待ち</button>
      <button class="chip" onclick="setFM('sold_pending')">🟠 入金待ち</button>
      <button class="chip" onclick="setFM('in_stock')">🔴 在庫</button>
    </div>
    <div class="vehicle-list" id="vlist-m"></div>
  </div>

  <!-- ══ グラフ ══ -->
  <div class="tab-panel" id="panel-chart">
    <div class="chart-section">
      <div class="chart-card-m">
        <h3>💰 精算ごとのJRE受取利益（各回）</h3>
        <canvas id="chart-profit-m" height="180"></canvas>
      </div>
      <div class="chart-card-m">
        <h3>🏆 車両別 利益ランキング</h3>
        <canvas id="chart-rank-m" height="220"></canvas>
      </div>
    </div>
  </div>

  <!-- ══ 精算 ══ -->
  <div class="tab-panel" id="panel-settle">
    <div class="settle-section" id="settle-m"></div>
    <div class="sec-title">📅 取引タイムライン</div>
    <div class="timeline-m" id="tl-m"></div>
  </div>

</div><!-- /app-content -->

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="tab-btn active" onclick="switchTab('home',this)">
    <span class="tab-icon">🏠</span>ホーム
  </button>
  <button class="tab-btn" onclick="switchTab('list',this)">
    <span class="tab-icon">🚙</span>台帳
  </button>
  <button class="tab-btn" onclick="switchTab('chart',this)">
    <span class="tab-icon">📊</span>グラフ
  </button>
  <button class="tab-btn" onclick="switchTab('settle',this)">
    <span class="tab-icon">💳</span>精算
  </button>
</nav>

<script>
let D = null;
let filterM = 'all';
let chartsBuilt = false;

async function init() {
  const r = await fetch('data/transactions.json');
  D = await r.json();
  document.getElementById('headerDate').textContent = D.meta.last_updated + ' 更新';
  renderHome();
  renderList();
  renderSettle();
}

const yen = n => n==null ? '—' : '¥'+Number(n).toLocaleString('ja-JP');
const num = n => n==null ? '—' : Number(n).toLocaleString('ja-JP');
const fd  = s => s ? s.replace(/-/g,'/') : '—';
const pct = (v,t) => t ? (v/t*100) : 0;

/* ── Tab switch ── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  // lazy-build charts
  if (name === 'chart' && !chartsBuilt && D) { buildCharts(); chartsBuilt = true; }
  // scroll to top
  document.querySelector('.app-content').scrollTo(0,0);
}

/* ══════════ HOME ══════════ */
function renderHome() {
  const vs = D.vehicles;
  const init = D.meta.initial_investment;
  const totalJRE = D.settlements.reduce((s,x)=>s+x.jre_distribution,0);
  const stockP = vs.filter(v=>v.status==='in_stock').reduce((s,v)=>s+v.purchase_price,0);
  const soldP  = vs.filter(v=>v.status==='sold_pending').reduce((s,v)=>s+v.purchase_price,0);
  const activeP = stockP + soldP;
  const t1cash  = init - activeP;
  const t2total = init + totalJRE;
  const t2cash  = t2total - activeP;

  // 1段目バー
  buildBarM('t1bar-m', 't1legend-m', [
    { lbl:'🚗在庫', val:stockP,  pct:pct(stockP,init),  cls:'seg-stock',  dot:'#e67e22' },
    { lbl:'🔶入金待', val:soldP, pct:pct(soldP,init),   cls:'seg-sold',   dot:'#f39c12' },
    { lbl:'💵現金',  val:t1cash, pct:pct(t1cash,init),  cls:'seg-cash',   dot:'#74b9ff' },
  ], init);

  // 2段目
  document.getElementById('t2val-m').textContent = yen(t2total);
  document.getElementById('t2sub-m').textContent =
    `+${yen(totalJRE)} (ROI ${(totalJRE/init*100).toFixed(1)}%) ／ 現金余力 ${yen(t2cash)}`;

  // 利益別勘定
  const pendV = vs.filter(v=>v.status==='principal_returned');
  document.getElementById('ledger-m').innerHTML = `
    <div class="ledger-title">💹 利益 別勘定台帳</div>
    <div class="ledger-grid">
      <div class="ledger-item">
        <div class="ledger-lbl">JRE確定利益</div>
        <div class="ledger-v">${yen(totalJRE)}</div>
        <div class="ledger-s">ROI ${(totalJRE/init*100).toFixed(1)}%</div>
      </div>
      <div class="ledger-item">
        <div class="ledger-lbl">はやちゃん取り分</div>
        <div class="ledger-v">${yen(D.settlements.reduce((s,x)=>s+x.gross_profit-x.jre_distribution,0))}</div>
        <div class="ledger-s">粗利益の60%</div>
      </div>
      <div class="ledger-item warn">
        <div class="ledger-lbl">利益精算待ち(${pendV.length}台)</div>
        <div class="ledger-v">確認中</div>
        <div class="ledger-s">${pendV.map(v=>v.name.split('H')[0]).join('・')||'なし'}</div>
      </div>
      <div class="ledger-item warn">
        <div class="ledger-lbl">入金待ち元金</div>
        <div class="ledger-v">${yen(soldP)}</div>
        <div class="ledger-s">${vs.filter(v=>v.status==='sold_pending').map(v=>v.name.split('H')[0]).join('・')}</div>
      </div>
    </div>
  `;

  // KPI
  const settled = vs.filter(v=>v.status==='settled');
  const avgP = settled.length ? Math.round(settled.reduce((s,v)=>s+(v.profit||0),0)/settled.length) : 0;
  const gross = D.settlements.reduce((s,x)=>s+x.gross_profit,0);
  const kpis = [
    {e:'💰',l:'JRE受取利益',v:yen(totalJRE),s:`ROI ${(totalJRE/init*100).toFixed(1)}%`,c:'g'},
    {e:'📦',l:'粗利益累計', v:yen(gross),   s:`はやちゃん ${yen(Math.round(gross*.6))}`,c:'gr'},
    {e:'🚙',l:'総取引台数', v:vs.length+'台',s:`精算完了 ${settled.length}台`,c:'b'},
    {e:'⏳',l:'運用中台数', v:(vs.length-settled.length)+'台',s:'在庫・精算待ち',c:'o'},
    {e:'🏅',l:'1台平均利益',v:yen(avgP),    s:`精算済${settled.length}台の平均`,c:'p'},
  ];
  document.getElementById('kpi-m').innerHTML = kpis.map(k=>`
    <div class="kpi-m ${k.c}">
      <div class="kpi-m-ico">${k.e}</div>
      <div class="kpi-m-lbl">${k.l}</div>
      <div class="kpi-m-val">${k.v}</div>
      <div class="kpi-m-sub">${k.s}</div>
    </div>
  `).join('');
}

function buildBarM(barId, legId, segs, total) {
  document.getElementById(barId).innerHTML = segs.map(s => {
    const p = Math.max(s.pct, 0);
    return `<div class="seg ${s.cls}" style="width:${p}%">${p>10?Math.round(p)+'%':''}</div>`;
  }).join('');
  document.getElementById(legId).innerHTML = segs.map(s=>`
    <div class="sl-row">
      <div class="sl-dot" style="background:${s.dot}"></div>
      <span class="sl-lbl">${s.lbl}</span>
      <span class="sl-v">${yen(s.val)}</span>
      <span class="sl-p">(${s.pct.toFixed(1)}%)</span>
    </div>
  `).join('');
}

/* ══════════ 台帳 ══════════ */
const STAT = {
  settled:           ['settled','bs','✅ 精算完了'],
  principal_returned:['principal','bp','💛 利益精算待ち'],
  sold_pending:      ['sold','bo','🟠 入金待ち'],
  in_stock:          ['stock','bk','🔴 在庫'],
};

function setFM(f) {
  filterM = f;
  document.querySelectorAll('.chip').forEach(c => {
    const map={all:'全件',settled:'精算完了',principal_returned:'精算待',sold_pending:'入金待',in_stock:'在庫'};
    c.classList.toggle('on', c.textContent.trim().includes(map[f]||''));
  });
  renderList();
}

function renderList() {
  if (!D) return;
  const vs = filterM==='all' ? D.vehicles : D.vehicles.filter(v=>v.status===filterM);
  document.getElementById('vlist-m').innerHTML = vs.map(v=>{
    const [sc,bc,bl] = STAT[v.status];
    const roi = v.purchase_price&&v.profit ? (v.profit/v.purchase_price*100).toFixed(0) : null;
    const roiColor = roi>30?'#27ae60':roi>15?'#f39c12':'#e74c3c';
    const totalCost = v.purchase_price && v.expenses ? v.purchase_price + v.expenses : v.purchase_price;
    return `<div class="vcard ${sc}">
      <div class="vcard-top">
        <div>
          <div class="vcard-name">No.${v.no}　${v.name}</div>
          <div class="vcard-year">${v.year}・${v.color}・${num(v.mileage)}km</div>
        </div>
        <span class="badge-m ${bc}">${bl}</span>
      </div>

      <!-- 仕入れ情報 -->
      <div class="vcard-grid">
        <div class="vg-item"><div class="vg-lbl">📅 仕入日</div><div class="vg-val">${fd(v.purchase_date)}</div></div>
        <div class="vg-item"><div class="vg-lbl">💴 仕入価格</div><div class="vg-val">${yen(v.purchase_price)}</div></div>
        <div class="vg-item"><div class="vg-lbl">🔧 諸経費</div><div class="vg-val cost">${yen(v.expenses)}</div></div>
        <div class="vg-item"><div class="vg-lbl">🧾 合計費用</div><div class="vg-val cost">${v.expenses ? yen(totalCost) : '—'}</div></div>
      </div>

      <hr class="vcard-divider">

      <!-- 売却情報 -->
      <div class="vcard-grid">
        <div class="vg-item"><div class="vg-lbl">🗓 売却日</div><div class="vg-val">${fd(v.sale_date)}</div></div>
        <div class="vg-item"><div class="vg-lbl">💰 販売価格</div><div class="vg-val">${yen(v.sale_price)}</div></div>
        <div class="vg-item"><div class="vg-lbl">📈 粗利益</div><div class="vg-val profit">${yen(v.profit)}</div></div>
        <div class="vg-item"><div class="vg-lbl">🏦 JRE取り分(40%)</div><div class="vg-val jre">${yen(v.jre_share)}</div></div>
      </div>

      <hr class="vcard-divider">

      <!-- 精算情報 -->
      <div class="vcard-grid">
        <div class="vg-item"><div class="vg-lbl">🔁 元金返金日</div><div class="vg-val">${fd(v.principal_returned_date)}</div></div>
        <div class="vg-item"><div class="vg-lbl">✅ 利益精算日</div><div class="vg-val">${fd(v.settlement_date)}</div></div>
      </div>

      ${roi!=null?`<div class="vcard-bar">
        <div class="vg-lbl">ROI ${roi}%</div>
        <div class="roi-track"><div class="roi-fill" style="width:${Math.min(roi,100)}%;background:${roiColor}"></div></div>
      </div>`:''}
      ${v.notes?`<div class="vcard-notes">📝 <strong>備考：</strong>${v.notes}</div>`:''}
    </div>`;
  }).join('');
}

/* ══════════ グラフ ══════════ */
function buildCharts() {
  // profit bar
  const wfL=[], wfD=[], wfC=[];
  D.settlements.forEach((s,i)=>{
    wfL.push(`第${i+1}回\n${s.date.slice(0,7)}`);
    wfD.push(s.jre_distribution);
    wfC.push(`hsla(${140-i*12},60%,${42+i*5}%,.88)`);
  });
  new Chart(document.getElementById('chart-profit-m'),{
    type:'bar',
    data:{labels:wfL,datasets:[{label:'JRE',data:wfD,backgroundColor:wfC,borderRadius:8,borderWidth:0}]},
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${yen(c.raw)}`}}},
      scales:{y:{ticks:{callback:v=>v===0?'0円':Math.round(v/10000)+'万円'},grid:{color:'rgba(0,0,0,0.05)'}}}}
  });

  // ranking
  const sv=D.vehicles.filter(v=>v.profit!=null&&v.profit>0).sort((a,b)=>b.jre_share-a.jre_share);
  const cols=['#27ae60','#2ecc71','#1abc9c','#16a085','#2980b9','#8e44ad','#e67e22'];
  new Chart(document.getElementById('chart-rank-m'),{
    type:'bar',
    data:{labels:sv.map(v=>v.name),datasets:[{label:'JRE',data:sv.map(v=>v.jre_share),
      backgroundColor:sv.map((_,i)=>cols[i%cols.length]+'cc'),borderRadius:6,borderWidth:0}]},
    options:{indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${yen(c.raw)}`}}},
      scales:{x:{ticks:{callback:v=>v===0?'0円':Math.round(v/10000)+'万円'},grid:{color:'rgba(0,0,0,0.05)'}}}}
  });
}

/* ══════════ 精算 ══════════ */
function renderSettle() {
  const tP=D.settlements.reduce((s,x)=>s+x.principal,0);
  const tG=D.settlements.reduce((s,x)=>s+x.gross_profit,0);
  const tJ=D.settlements.reduce((s,x)=>s+x.jre_distribution,0);

  document.getElementById('settle-m').innerHTML = D.settlements.map(s=>`
    <div class="scard">
      <div class="scard-date">${fd(s.date)}</div>
      <div class="scard-label">${s.label}</div>
      <div class="scard-row"><span class="sl">元金</span><span class="sr">${yen(s.principal)}</span></div>
      <div class="scard-row"><span class="sl">粗利益</span><span class="sr">${yen(s.gross_profit)}</span></div>
      <hr class="scard-divider">
      <div class="scard-row"><span class="sl">JRE受取（40%）</span><span class="sr scard-total">${yen(s.jre_distribution)}</span></div>
    </div>
  `).join('') + `
    <div class="scard total">
      <div class="scard-date">累計（全精算）</div>
      <div class="scard-label" style="color:var(--gold)">合計 🏆</div>
      <div class="scard-row"><span class="sl">元金合計</span><span class="sr">${yen(tP)}</span></div>
      <div class="scard-row"><span class="sl">粗利益合計</span><span class="sr">${yen(tG)}</span></div>
      <hr class="scard-divider">
      <div class="scard-row"><span class="sl">JRE累計受取</span><span class="sr scard-total">${yen(tJ)}</span></div>
    </div>
  `;

  // timeline
  const evs=[];
  D.vehicles.forEach(v=>{
    if(v.purchase_date) evs.push({date:v.purchase_date,type:'buy',v});
    if(v.sale_date&&v.sale_date.length===10) evs.push({date:v.sale_date,type:'sell',v});
  });
  evs.sort((a,b)=>a.date>b.date?-1:1);
  document.getElementById('tl-m').innerHTML = evs.map(e=>`
    <div class="tl-m">
      <div class="tl-dot-m ${e.type==='buy'?'buy':'sell'}">${e.type==='buy'?'🛒':'💰'}</div>
      <div class="tl-body-m">
        <div class="tl-date-m">${fd(e.date)}</div>
        <div class="tl-name-m">【${e.type==='buy'?'仕入れ':'売却'}】${e.v.name} (${e.v.year})</div>
        <div class="tl-det-m">${e.type==='buy'
          ? `${e.v.color} / ${num(e.v.mileage)}km / ${yen(e.v.purchase_price)}`
          : e.v.sale_price ? `${yen(e.v.sale_price)} → 利益 ${yen(e.v.profit)}` : '販売価格確認中'
        }</div>
      </div>
    </div>
  `).join('');
}

init();
</script>
</body>
</html>
